<!DOCTYPE html>
<html>
<head>
    <title>Cyber URL Scanner</title>

    <!-- ✅ MOBILE RESPONSIVENESS FIX -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #020617, #0ea5e9);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            padding: 15px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ✅ RESPONSIVE CONTAINER */
        .container {
            width: 90%;
            max-width: 420px;
            padding: 25px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            text-align: center;
        }

        h1 {
            color: #38bdf8;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        input, button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
        }

        input {
            border: none;
            outline: none;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        input:focus {
            box-shadow: 0 0 10px #38bdf8;
        }

        button {
            border: none;
            background: linear-gradient(90deg, #38bdf8, #0ea5e9);
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #38bdf8;
        }

        #loader {
            display: none;
            margin-top: 15px;
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #38bdf8;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        #result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 15px;
            display: none;
            animation: fadeIn 0.5s ease;
            font-size: 0.9rem;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(10px);}
            to {opacity: 1; transform: translateY(0);}
        }

        .safe { background: rgba(34,197,94,0.8); }
        .moderate { background: rgba(234,179,8,0.8); }
        .suspicious { background: rgba(239,68,68,0.8); }

        ul {
            text-align: left;
            margin-top: 10px;
        }

        /* ✅ MOBILE OPTIMIZATION */
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🔐 Cyber URL Scanner</h1>

    <input type="text" id="urlInput" placeholder="Paste URL here..." />

    <button onclick="checkURL()">Scan Now</button>

    <div id="loader">
        <div class="spinner"></div>
        <p>Scanning URL...</p>
    </div>

    <div id="result"></div>
</div>

<script>
async function checkURL() {
    const url = document.getElementById("urlInput").value;
    const loader = document.getElementById("loader");
    const resultDiv = document.getElementById("result");

    resultDiv.style.display = "none";
    loader.style.display = "block";

    await new Promise(r => setTimeout(r, 800));

    const response = await fetch(`https://url-safety-checker-6j8d.onrender.com/check?url=${url}`);
    const data = await response.json();

    loader.style.display = "none";

    let className = "";
    let icon = "";

    if (data.verdict === "Safe") {
        className = "safe";
        icon = "✅";
    } else if (data.verdict === "Moderate Risk") {
        className = "moderate";
        icon = "⚠️";
    } else {
        className = "suspicious";
        icon = "🚨";
    }

    resultDiv.className = className;
    resultDiv.style.display = "block";

    resultDiv.innerHTML = `
        <h2>${icon} ${data.verdict}</h2>

        <p><b>🧠 Risk Level:</b> ${data.risk_level}</p>

        <p><b>📊 Safety Score:</b> ${data.confidence}% safe</p>

        <p><b>📌 Why this result:</b></p>
        <p>${data.explanation}</p>

        <p><b>⚠️ Issues Detected:</b></p>
        <ul>
            ${data.reasons.map(r => `<li>${r}</li>`).join("")}
        </ul>

        <p><b>🛡️ What you should do:</b></p>
        <ul>
            ${data.precautions.map(p => `<li>${p}</li>`).join("")}
        </ul>
    `;
}
</script>

</body>
</html>
